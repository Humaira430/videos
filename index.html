<title>My Video Page</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color:#203a43;
    color:white;
    text-align:center;
}

header{
    padding:30px;
    font-size:32px;
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:15px;
    width:220px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.08);
    background:rgba(255,255,255,0.2);
}

.card a{
    text-decoration:none;
    color:white;
    font-size:20px;
    font-weight:bold;
}

</style>

</head>
